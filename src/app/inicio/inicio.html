<div class="pantalla-fondo">
  <div class="gameboy-frame">
    <img [src]="personaje1" class="pokemon-marco p1" alt="Extra 1">
    <img [src]="personaje2" class="pokemon-marco p2" alt="Extra 2">
    <img [src]="personaje3" class="pokemon-marco p3" alt="Extra 3">
    <img [src]="personaje4" class="pokemon-marco p4" alt="Extra 4">

    <div class="gameboy-screen">
      <div class="fuego-container">
        <div class="particula-fuego"></div>
        <div class="particula-fuego"></div>
        <div class="particula-fuego"></div>
        <div class="particula-fuego"></div>
        <div class="particula-fuego"></div>
        <div class="particula-fuego"></div>
      </div>

      <img [src]="url" class="pokemon-legendario left" alt="Legendario 1">
      <img [src]="url" class="pokemon-legendario right" alt="Legendario 2">

      <div class="logo-container">
        <img src="logo.png" alt="Logo Pokémon" class="pokemon-logo">
        <h2 class="subtitulo-edicion">Development<br>Edition 3</h2>
      </div>
      <div class="start-bar">
        <div class="start-container" routerLink="/login">
          <button class="blink-text">PRESS START</button>
        </div>
      </div>
      </div>
    </div>
  </div>
