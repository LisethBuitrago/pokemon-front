<div class="gameboy-screen admin-bg">

  <div class="admin-layout">
    <aside class="cuadro-dialogo sidebar-gba">
      <h3 class="menu-title">ADMIN</h3>
      <ul>
        <li (click)="irAPokemon()"><span class="flecha">○</span> POKÉMON</li>
        <li (click)="irAAtaques()"><span class="flecha">○</span> ATAQUES</li>
        <li class="active" (click)="irAObjetos()"><span class="flecha">▶</span> OBJETOS</li>
        <li (click)="irAEntrenadores()"><span class="flecha">○</span> JUGADORES</li>
      </ul>
      <button class="btn-logout-gba" (click)="cerrarSesion()">▶ SALIR</button>
    </aside>

    <section class="main-workspace">
      <div class="cuadro-dialogo header-box-gba">
        <h2 class="titulo-seccion">GESTIÓN DE OBJETOS</h2>
        <div class="search-bar-gba">
          <span>🔍</span>
          <input type="text" placeholder="Buscar objeto..." [(ngModel)]="textoBusqueda">
        </div>
      </div>

      <div class="cuadro-dialogo list-box-gba">
        <div class="retro-list-container">
          <ul class="retro-list">
            <li *ngFor="let obj of listaFiltrada"
                [class.selected]="objetoSeleccionado === obj.id"
                (click)="seleccionarObjeto(obj.id)">
              <span class="cursor">{{ objetoSeleccionado === obj.id ? '▶' : '○' }}</span>
              <span class="col-id">{{ obj.id }}</span>
              <span class="col-name">{{ obj.nombre }}</span>
              <span class="col-type" *ngFor="let cat of obj.categorias">[{{ cat }}]</span>
            </li>
          </ul>
        </div>

        <div class="footer-actions">
          <button class="btn-gba" (click)="aceptar()">
            <span class="flecha">▶</span> EDITAR OBJETO
          </button>
        </div>
      </div>
    </section>
  </div>

</div>
