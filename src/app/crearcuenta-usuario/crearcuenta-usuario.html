<div class="gameboy-screen">
  <div class="cuadro-dialogo login-box">
    <h2 class="titulo-pokemon">CREAR CUENTA</h2>

    <div class="formulario">
      <div class="fila-formulario">
        <div class="etiqueta-con-icono">
          <img [src]="pokeball" alt="pokeball" class="icono-gba">
          <label>USUARIO</label>
        </div>
        <input type="text" [(ngModel)]="nombre" name="nombre" class="input-gba" placeholder="Tu nombre">
      </div>

      <div class="fila-formulario">
        <div class="etiqueta-con-icono">
          <img [src]="correoIcono" alt="correo" class="icono-gba">
          <label>CORREO</label>
        </div>
        <input type="email" [(ngModel)]="correo" name="correo" class="input-gba" placeholder="tu@email.com">
      </div>

      <div class="fila-formulario">
        <div class="etiqueta-con-icono-key">
          <img [src]="key" alt="llave" class="icono-key">
          <label>CONTRASEÑA</label>
        </div>
        <input type="password" [(ngModel)]="contrasenia" name="contrasenia" class="input-gba" placeholder="******">
      </div>

      <div class="contenedor-entrar">
        <button class="btn-gba" (click)="seleccionarOpcion('registrar')">
          <span class="flecha">▶</span> REGISTRAR
        </button>
      </div>
    </div>
  </div>

  <div class="cuadro-dialogo registro-box">
    <p>¿Ya tienes una cuenta?</p>
    <button class="btn-texto" (click)="seleccionarOpcion('login')">
      <span class="flecha">▶</span> INICIAR SESION
    </button>
  </div>

</div>
